name: Continuous Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system -e ".[a2a,test]" -e ./packages/ap3-functions

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Generate coverage report
        run: pytest tests/unit/ --cov=src/ap3 --cov-report=term --cov-report=xml

      - name: Upload coverage
        # Pinned to a commit SHA to defend against tag-mutation supply-chain
        # attacks. Bump intentionally; do not switch back to a floating tag.
        # codecov/codecov-action v4.6.0
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install uv
          uv pip install --system -e ".[a2a,test]" -e ./packages/ap3-functions

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short
