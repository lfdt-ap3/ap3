[project]
name = "ap3-functions"
version = "1.2.1"
description = "AP3 cryptographic operation implementations"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.11,<3.14"
dependencies = ["ap3>=1.2.1", "rbcl", "merlin_transcripts"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ap3_functions"]

[tool.uv.sources]
ap3 = { workspace = true }
