[pytest]
# Pytest configuration for AP3 SDK tests

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    -ra

# Markers for organizing tests
markers =
    unit: Unit tests for individual components
    integration: Integration tests for multi-component workflows
    slow: Tests that take significant time to run
    protocol: Tests that execute full protocol flows
    requires_network: Tests that require network access
    asyncio: Async tests

# Coverage options
[coverage:run]
source = src/ap3
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
